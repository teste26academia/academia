<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Garra de Águia PG</title>

<style>

body{
background:#000;
font-family:Arial;
color:white;
padding:20px;
max-width:700px;
margin:auto;
}

input{
width:100%;
padding:15px;
margin-top:10px;
border-radius:10px;
border:none;
background:#18181b;
color:white;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.blue{
background:#2563eb;
}

.green{
background:#16a34a;
}

.red{
background:#dc2626;
}

.gray{
background:#52525b;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
margin-top:20px;
}

</style>

</head>

<body>

<h1>Liga Garra de Águia PG</h1>

<div class="card">

<h2>Login Firebase</h2>

<div id="statusLogin">Desconectado</div>

<input
id="phone"
placeholder="+5513999999999"
>

<div id="recaptcha-container" style="margin-top:15px;"></div>

<button
onclick="sendCode()"
class="blue"
>
Enviar código
</button>

<input
id="smsCode"
placeholder="Código SMS"
>

<button
onclick="confirmCode()"
class="green"
>
Confirmar login
</button>

</div>

<div class="card">

<h2>Cadastrar aluno</h2>

<input
id="nomeAluno"
placeholder="Nome do aluno"
>

<input
id="faixaAluno"
placeholder="Faixa"
>

<button
onclick="salvarAluno()"
class="red"
>
Salvar aluno
</button>

<button
onclick="logoutSistema()"
class="gray"
>
Logout
</button>

<div id="listaAlunos" style="margin-top:20px;"></div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
