<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Garra de Águia PG</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen">

<header class="bg-zinc-900 border-b border-red-700 p-4 flex justify-between items-center">
<div>
<h1 class="text-3xl font-bold text-red-500">Liga Garra de Águia PG</h1>
<p class="text-zinc-400">Kung Fu Garra de Águia Praia Grande</p>
</div>

<div class="flex gap-3">
<button onclick="showAdmin()" class="bg-red-700 px-5 py-3 rounded-xl font-bold">
Painel Admin
</button>

<button onclick="showAluno()" class="bg-blue-700 px-5 py-3 rounded-xl font-bold">
Área do Aluno
</button>
</div>
</header>

<main class="p-6 max-w-7xl mx-auto">

<section id="dashboard" class="grid md:grid-cols-4 gap-4">
<div class="bg-zinc-900 rounded-2xl p-5">
<p class="text-zinc-400">Alunos</p>
<h2 class="text-3xl font-bold text-red-500">128</h2>
</div>

<div class="bg-zinc-900 rounded-2xl p-5">
<p class="text-zinc-400">Mensalidades</p>
<h2 class="text-3xl font-bold text-green-500">R$ 12.450</h2>
</div>

<div class="bg-zinc-900 rounded-2xl p-5">
<p class="text-zinc-400">Presenças</p>
<h2 class="text-3xl font-bold text-yellow-500">34</h2>
</div>

<div class="bg-zinc-900 rounded-2xl p-5">
<p class="text-zinc-400">Faixas</p>
<h2 class="text-3xl font-bold text-purple-500">7</h2>
</div>
</section>

<section id="adminPanel" class="hidden mt-8 bg-zinc-900 rounded-3xl p-6">
<h2 class="text-2xl font-bold text-red-500 mb-6">Painel Administrativo</h2>

<div class="grid md:grid-cols-2 gap-4">

<input id="nome" class="bg-zinc-800 p-4 rounded-xl" placeholder="Nome do aluno">

<input id="faixa" class="bg-zinc-800 p-4 rounded-xl" placeholder="Faixa">

<input id="mensalidade" class="bg-zinc-800 p-4 rounded-xl" placeholder="Mensalidade">

<input id="telefone" class="bg-zinc-800 p-4 rounded-xl" placeholder="Telefone">

</div>

<button onclick="salvarAluno()" class="mt-6 bg-red-700 px-6 py-4 rounded-xl font-bold">
Salvar aluno
</button>

<div id="listaAlunos" class="mt-8 grid md:grid-cols-2 gap-4"></div>
</section>

<section id="alunoPanel" class="hidden mt-8 bg-zinc-900 rounded-3xl p-6">
<h2 class="text-2xl font-bold text-blue-500 mb-4">Área do Aluno</h2>

<div class="grid md:grid-cols-3 gap-4">
<div class="bg-zinc-800 rounded-2xl p-4">
<h3 class="font-bold">Presença</h3>
<p>18 aulas este mês</p>
</div>

<div class="bg-zinc-800 rounded-2xl p-4">
<h3 class="font-bold">Mensalidade</h3>
<p>Status: Pago</p>
</div>

<div class="bg-zinc-800 rounded-2xl p-4">
<h3 class="font-bold">Faixa</h3>
<p>Intermediária</p>
</div>
</div>
</section>

</main>

<script>
const alunos = [];

function showAdmin() {
document.getElementById('adminPanel').classList.remove('hidden');
document.getElementById('alunoPanel').classList.add('hidden');
}

function showAluno() {
document.getElementById('alunoPanel').classList.remove('hidden');
document.getElementById('adminPanel').classList.add('hidden');
}

function salvarAluno() {
const nome = document.getElementById('nome').value;
const faixa = document.getElementById('faixa').value;
const mensalidade = document.getElementById('mensalidade').value;
const telefone = document.getElementById('telefone').value;

alunos.push({ nome, faixa, mensalidade, telefone });

renderAlunos();

alert('Aluno salvo!');
}

function renderAlunos() {
const lista = document.getElementById('listaAlunos');

lista.innerHTML = '';

alunos.forEach((aluno) => {
lista.innerHTML += `
<div class="bg-zinc-800 rounded-2xl p-4">
<h3 class="font-bold text-red-500">${aluno.nome}</h3>
<p>Faixa: ${aluno.faixa}</p>
<p>Mensalidade: ${aluno.mensalidade}</p>
<p>Telefone: ${aluno.telefone}</p>
</div>
`;
});
}
</script>

</body>
</html>
