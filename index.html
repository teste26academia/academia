<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liga Garra de Águia PG</title>
<script src="https://cdn.tailwindcss.com"></script>
<script type="module" src="app.js"></script>
</head>
<body class="bg-black text-white min-h-screen">

<header class="bg-zinc-900 border-b border-red-700 p-4 flex items-center justify-between">
  <div>
    <h1 class="text-2xl font-bold text-red-500">Liga Garra de Águia PG</h1>
    <p class="text-zinc-400 text-sm">Kung Fu Garra de Águia Praia Grande</p>
  </div>
  <div class="bg-red-700 px-4 py-2 rounded-xl">Firebase Online</div>
</header>

<main class="max-w-6xl mx-auto p-6">
  <div class="grid md:grid-cols-2 gap-6">

    <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
      <h2 class="text-2xl font-bold text-red-500 mb-4">Login por Telefone</h2>

      <input id="phone" class="w-full bg-zinc-800 rounded-xl p-4 mb-4"
      placeholder="+55 13 99999-9999">

      <div id="recaptcha-container"></div>

      <button id="sendCode"
      class="w-full bg-red-700 hover:bg-red-600 rounded-xl p-4 font-bold">
      Enviar código
      </button>

      <input id="code"
      class="w-full bg-zinc-800 rounded-xl p-4 mt-4"
      placeholder="Código SMS">

      <button id="verifyCode"
      class="w-full bg-green-700 hover:bg-green-600 rounded-xl p-4 mt-4 font-bold">
      Entrar
      </button>
    </div>

    <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800">
      <h2 class="text-2xl font-bold text-red-500 mb-4">Cadastro de Alunos</h2>

      <input id="nome" class="w-full bg-zinc-800 rounded-xl p-4 mb-4"
      placeholder="Nome do aluno">

      <input id="faixa" class="w-full bg-zinc-800 rounded-xl p-4 mb-4"
      placeholder="Faixa">

      <button id="salvarAluno"
      class="w-full bg-blue-700 hover:bg-blue-600 rounded-xl p-4 font-bold">
      Salvar aluno
      </button>

      <div id="listaAlunos" class="mt-6 space-y-3"></div>
    </div>

  </div>
</main>

</body>
</html>
