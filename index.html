<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garra de Águia PG - Fase 1</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#081120;
color:white;
}
.topbar{
padding:14px;
background:#111827;
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
}
.logo{
font-weight:bold;
font-size:18px;
}
.grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
padding:12px;
}
.card{
background:#172033;
border-radius:18px;
padding:18px;
}
.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111827;
display:grid;
grid-template-columns:repeat(5,1fr);
padding:10px;
gap:6px;
}
.navbtn{
background:#1f2937;
border:none;
color:white;
padding:10px;
border-radius:12px;
font-size:12px;
}
.hero{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}
@media(min-width:900px){
.grid{
grid-template-columns:280px 1fr;
}
.sidebar{
display:block;
}
}
</style>
</head>
<body>

<div class="topbar">
<div class="logo">🥋 Garra de Águia PG</div>
<div>Mobile Premium Fase 1</div>
</div>

<div class="grid">
<div class="sidebar">
<div class="card">
<h3>Menu</h3>
<p>Dashboard</p>
<p>Alunos</p>
<p>Pagamentos</p>
<p>Presenças</p>
</div>
</div>

<div>
<div class="hero">
<div class="card">
<h2>124</h2>
<p>Alunos</p>
</div>

<div class="card">
<h2>18</h2>
<p>Vencidos</p>
</div>
</div>

<div class="card">
<h2>Painel Premium</h2>
<p>Primeira versão funcional da Fase 1 mobile premium.</p>
</div>
</div>
</div>

<div class="bottomnav">
<button class="navbtn">🏠</button>
<button class="navbtn">👥</button>
<button class="navbtn">💳</button>
<button class="navbtn">📅</button>
<button class="navbtn">⚙️</button>
</div>

</body>
</html>
