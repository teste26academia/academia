<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Academia Pro | Estável</title>
<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#07111f;
  color:white;
}
header{
  padding:20px;
  background:#101c33;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.container{
  display:grid;
  grid-template-columns:240px 1fr;
  min-height:100vh;
}
.sidebar{
  background:#0d1729;
  padding:20px;
}
.sidebar button{
  width:100%;
  margin-bottom:12px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#16233f;
  color:white;
  cursor:pointer;
}
.main{
  padding:20px;
}
.card{
  background:#111d35;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px;
}
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:8px;
  margin-bottom:14px;
}
.btn{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:white;
  cursor:pointer;
}
.hidden{
  display:none;
}
</style>
</head>
<body>

<header>
  <div>
    <h2>Academia Pro | Gestão Completa</h2>
    <small>Versão estável restaurada</small>
  </div>
  <div>
    <button class="btn" onclick="abrirLogin()">Entrar</button>
  </div>
</header>

<div class="container">
  <div class="sidebar">
    <button>Dashboard</button>
    <button>Alunos</button>
    <button>Mensalidades</button>
    <button>Presenças</button>
    <button>Financeiro</button>
    <button>Portal do aluno</button>
    <button>Backup</button>
  </div>

  <div class="main">
    <div class="card">
      <h2>Painel principal</h2>
      <p>Sistema restaurado em versão estável.</p>
    </div>

    <div class="card">
      <h3>Cadastro rápido</h3>
      <input placeholder="Nome do aluno">
      <input placeholder="Telefone">
      <button class="btn">Salvar aluno</button>
    </div>

    <div class="card">
      <h3>Status</h3>
      <p id="status">Sistema funcionando corretamente.</p>
    </div>
  </div>
</div>

<div id="loginBox" class="hidden" style="
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
">
  <div style="
  background:#101c33;
  padding:30px;
  border-radius:20px;
  width:320px;
  ">
    <h2>Login Admin</h2>
    <input id="user" placeholder="Usuário">
    <input id="pass" type="password" placeholder="Senha">
    <button class="btn" onclick="login()">Entrar</button>
    <button class="btn" style="background:#374151;margin-top:10px;" onclick="fecharLogin()">Fechar</button>
    <p id="msg"></p>
  </div>
</div>

<script>
const ADMIN_USER = "Admin26";
const ADMIN_PASS = "Igorpacote2024";

function abrirLogin(){
  document.getElementById('loginBox').classList.remove('hidden');
}

function fecharLogin(){
  document.getElementById('loginBox').style.display='none';
}

function login(){
  const u = document.getElementById('user').value;
  const p = document.getElementById('pass').value;

  if(u === ADMIN_USER && p === ADMIN_PASS){
    document.getElementById('msg').innerHTML = "Login realizado com sucesso.";
    document.getElementById('status').innerHTML = "Administrador conectado.";

    setTimeout(() => {
      document.getElementById('loginBox').style.display = 'none';
    }, 500);

  }else{
    document.getElementById('msg').innerHTML = "Usuário ou senha incorretos.";
  }
}
</script>

</body>
</html>
